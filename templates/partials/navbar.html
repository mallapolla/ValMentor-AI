<nav class="w-full px-6 py-4 flex items-center justify-between border-b border-slate-900 bg-slate-950/80 backdrop-blur-md sticky top-0 z-30">
    <div class="flex items-center space-x-4 md:hidden">
        <!-- Mobile Sidebar Toggle -->
        <button id="sidebar-toggle-btn" class="p-2 rounded-lg bg-slate-900 border border-slate-800 text-slate-300 hover:text-slate-100">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <span class="font-heading font-bold text-lg text-slate-100">ValMentor</span>
    </div>
    
    <!-- Left Navigation context / notifications placeholder -->
    <div class="hidden md:flex items-center space-x-2 text-sm text-slate-400">
        <span>Active Path:</span>
        <span class="px-2 py-0.5 rounded bg-slate-900 text-cyan-400 font-semibold text-xs uppercase">{{ user_profile.target_role|default:"Python Developer" }}</span>
    </div>
    
    <!-- Right side controls: Streaks, XP, Avatar -->
    <div class="flex items-center space-x-6">
        <!-- Streaks -->
        <div class="flex items-center space-x-1.5 cursor-help" title="Daily Activity Streak">
            <span class="text-lg">🔥</span>
            <span class="text-sm font-bold text-amber-500">{{ user_streak|default:0 }} days</span>
        </div>
        
        <!-- Level & XP -->
        <div class="hidden sm:flex flex-col items-end text-xs">
            <span class="font-semibold text-slate-300">Level {{ user_level|default:1 }}</span>
            <span class="text-slate-500 font-mono">{{ user_xp|default:0 }} XP</span>
        </div>
        
        <!-- User Dropdown Profile trigger -->
        <div class="relative" x-data="{ open: false }">
            <button @click="open = !open" class="flex items-center space-x-2 focus:outline-none">
                {% if user_profile.avatar %}
                    <img src="{{ user_profile.avatar.url }}" alt="Avatar" class="h-8 w-8 rounded-full border border-slate-700 object-cover">
                {% else %}
                    <div class="h-8 w-8 rounded-full bg-gradient-to-tr from-brand-blue to-brand-purple flex items-center justify-center font-bold text-sm text-white">{{ user.username|slice:":1"|upper }}</div>
                {% endif %}
                <span class="hidden md:inline text-sm font-medium text-slate-300 hover:text-slate-100 transition">{{ user.username }}</span>
            </button>
            
            <!-- Dropdown panel -->
            <div x-show="open" @click.away="open = false" 
                 class="absolute right-0 mt-2 w-48 rounded-xl border border-slate-800 bg-slate-900/90 backdrop-blur-md py-1 shadow-2xl z-40"
                 x-transition:enter="transition ease-out duration-100"
                 x-transition:enter-start="transform opacity-0 scale-95"
                 x-transition:enter-end="transform opacity-100 scale-100"
                 x-transition:leave="transition ease-in duration-75"
                 x-transition:leave-start="transform opacity-100 scale-100"
                 x-transition:leave-end="transform opacity-0 scale-95"
                 style="display: none;">
                <a href="{% url 'accounts:profile' %}" class="block px-4 py-2 text-sm text-slate-300 hover:bg-slate-800 hover:text-white transition">My Profile</a>
                <a href="{% url 'accounts:profile' %}#settings" class="block px-4 py-2 text-sm text-slate-300 hover:bg-slate-800 hover:text-white transition">Settings</a>
                <hr class="border-slate-800 my-1">
                <a href="{% url 'accounts:logout' %}" class="block px-4 py-2 text-sm text-rose-400 hover:bg-slate-800 hover:text-rose-300 transition">Logout</a>
            </div>
        </div>
    </div>
</nav>
