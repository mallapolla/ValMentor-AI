{% extends 'base.html' %}

{% block title %}Reset Password — ValMentor AI{% endblock %}

{% block public_content %}
<div class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md p-8 rounded-2xl border border-slate-900 bg-slate-950/60 shadow-2xl glass-card space-y-6">
        <div class="text-center space-y-2">
            <h2 class="font-heading font-bold text-2xl text-slate-100">Reset Password</h2>
            <p class="text-slate-400 text-sm">Enter your account email to receive reset instructions.</p>
        </div>
        
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div class="space-y-1">
                <label for="email" class="text-xs font-semibold text-slate-300">Email Address</label>
                <input type="email" name="email" id="email" required
                       class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-slate-100 text-sm focus:outline-none focus:border-cyan-500 placeholder-slate-600 transition"
                       placeholder="you@example.com">
            </div>
            
            <button type="submit" 
                    class="w-full py-3.5 rounded-xl bg-cyan-500 hover:bg-cyan-600 text-slate-950 font-bold text-sm shadow-lg shadow-cyan-500/10 transition transform hover:-translate-y-0.5">
                Send Instructions
            </button>
        </form>
        
        <div class="text-center text-xs">
            <a href="{% url 'accounts:login' %}" class="text-slate-400 hover:text-slate-200 transition">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
